<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicadores Financieros del Sistema Financiero — BCR</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- ============================================================
     PANTALLA PRINCIPAL · 1920x640
     Franja superior fija (KPIs) + cuerpo de DOS secciones:
       - Lateral izquierdo: índice-resumen (resalta el activo)
       - Central: dato ampliado que rota
     ============================================================ -->
<div id="pantalla">

  <!-- ===== FRANJA SUPERIOR FIJA ===== -->
  <header id="franja-superior">
    <div id="marca">
      <div id="marca-titulo">INDICADORES FINANCIEROS</div>
      <div id="marca-subtitulo">DEL SISTEMA FINANCIERO (TODAS LAS INSTITUCIONES)</div>
    </div>
    <div id="kpis-fijos">
      <div class="kpi" id="kpi-depositos">
        <div class="kpi-label">Depósitos</div>
        <div class="kpi-valor" id="kpi-depositos-valor">—</div>
        <div class="kpi-var" id="kpi-depositos-var"></div>
      </div>
      <div class="kpi" id="kpi-prestamos">
        <div class="kpi-label">Préstamos</div>
        <div class="kpi-valor" id="kpi-prestamos-valor">—</div>
        <div class="kpi-var" id="kpi-prestamos-var"></div>
      </div>
      <div class="kpi" id="kpi-mora">
        <div class="kpi-label">Mora</div>
        <div class="kpi-valor" id="kpi-mora-valor">—</div>
        <div class="kpi-var kpi-ref" id="kpi-mora-ref"></div>
      </div>
      <div class="kpi" id="kpi-solvencia">
        <div class="kpi-label">Solvencia</div>
        <div class="kpi-valor" id="kpi-solvencia-valor">—</div>
        <div class="kpi-var kpi-ref" id="kpi-solvencia-ref"></div>
      </div>
      <div class="kpi" id="kpi-utilidad">
        <div class="kpi-label">Utilidad</div>
        <div class="kpi-valor" id="kpi-utilidad-valor">—</div>
        <div class="kpi-var" id="kpi-utilidad-var"></div>
      </div>
    </div>
    <div id="reloj">
      <div id="reloj-fecha">—</div>
      <div id="reloj-hora">—</div>
      <div id="marca-bcr">BCR</div>
    </div>
  </header>

  <!-- ===== CUERPO: DOS SECCIONES ===== -->
  <div id="cuerpo">

    <!-- Lateral izquierdo: índice-resumen -->
    <aside id="lateral">
      <div id="lateral-titulo">Resumen general</div>
      <div id="lateral-lista">
        <!-- ítems inyectados desde app.js -->
      </div>
    </aside>

    <!-- Central: dato ampliado rotativo -->
    <main id="central">
      <!-- capítulos inyectados desde app.js -->
    </main>

  </div>

</div>

<script src="/js/anime.umd.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
